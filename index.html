<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ellary - Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --white: #FFFFFF;
      --light-gray: #F5F5F5;
      --pink: #FFB0CC;
      --dark-gray: #5D5D5D;
      --bright-pink: #FF0084;
      --font-serif: 'Noto Serif SC', serif;
      --font-sans: 'Inter', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: var(--font-sans); color: var(--dark-gray); background: var(--white); line-height: 1.6; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
    .navbar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; transition: all 0.3s ease; background: transparent; }
    .navbar.scrolled { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); box-shadow: 0 2px 20px rgba(0,0,0,0.05); }
    .navbar-content { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; }
    .logo-text { font-family: var(--font-serif); font-size: 24px; font-weight: 700; color: var(--dark-gray); letter-spacing: 2px; }
    .navbar-links { display: flex; list-style: none; gap: 40px; }
    .nav-link { font-family: var(--font-sans); font-size: 14px; font-weight: 500; color: var(--dark-gray); background: none; border: none; cursor: pointer; position: relative; padding: 8px 12px; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px; }
    .nav-link:hover, .nav-link.active { color: var(--bright-pink); }
    .nav-link::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 0; height: 2px; background: var(--pink); transition: width 0.3s ease; }
    .nav-link:hover::after, .nav-link.active::after { width: 80%; }
    .mobile-menu-btn { display: none; flex-direction: column; gap: 6px; background: none; border: none; cursor: pointer; padding: 8px; }
    .menu-icon { width: 24px; height: 2px; background: var(--dark-gray); }
    .mobile-menu { display: none; flex-direction: column; gap: 10px; padding: 20px 0; border-top: 1px solid var(--light-gray); }
    .mobile-nav-link { font-family: var(--font-sans); font-size: 16px; color: var(--dark-gray); background: none; border: none; cursor: pointer; padding: 12px 0; text-align: left; }
    .mobile-nav-link:hover, .mobile-nav-link.active { color: var(--bright-pink); }


    /* ============ Home：参考图风格首页 ============ */
    .home {
      --mx: 50%;
      --my: 50%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at var(--mx) var(--my), rgba(255, 255, 255, 0.55) 0%, rgba(255, 255, 255, 0.18) 22%, transparent 46%),
        radial-gradient(circle at 78% 68%, rgba(255, 255, 255, 0.2) 0 0, transparent 26%),
        linear-gradient(135deg, #ffb4d4 0%, #f6a2c7 45%, #ffd0e2 100%);
    }

    .home::before {
      content: '';
      position: absolute;
      inset: -20%;
      pointer-events: none;
      background-image:
        radial-gradient(rgba(36, 36, 36, 0.2) 0.65px, transparent 0.85px),
        radial-gradient(rgba(255, 255, 255, 0.25) 0.75px, transparent 1px);
      background-size: 4px 4px, 7px 7px;
      background-position: 0 0, 2px 3px;
      opacity: 0.22;
      mix-blend-mode: multiply;
      transform: rotate(-1deg);
    }

    .home::after {
      content: '';
      position: absolute;
      width: 560px;
      height: 560px;
      right: -150px;
      bottom: -160px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.18);
      filter: blur(1px);
      pointer-events: none;
    }

    .home-container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 1320px;
      padding: 0 40px;
    }

    .home-content {
      min-height: 78vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      text-align: center;
      position: relative;
      isolation: isolate;
    }

    .home-eyebrow {
      font-family: "Courier New", monospace;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.28em;
      color: #1e1e1e;
      text-transform: uppercase;
      background: rgba(255, 255, 255, 0.28);
      border: 1.5px solid #1e1e1e;
      padding: 8px 14px;
      box-shadow: 4px 4px 0 #1e1e1e;
      transform: rotate(-1.2deg);
    }

    .hero-name-wrap {
      position: relative;
      width: min(980px, 92vw);
      min-height: clamp(150px, 22vw, 260px);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: default;
    }

    .home-script {
      position: absolute;
      left: 44%;
      top: 50%;
      transform: translate(-50%, -54%) rotate(-8deg);
      z-index: -1;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(100px, 16vw, 245px);
      font-style: italic;
      line-height: 0.8;
      color: #fff;
      -webkit-text-stroke: 2px #1e1e1e;
      text-shadow: 3px 3px 0 rgba(255, 255, 255, 0.65);
      transition: transform 0.35s ease, letter-spacing 0.35s ease;
      opacity: 0.96;
    }

    .hero-name-wrap:hover .home-script {
      transform: translate(-52%, -56%) rotate(-10deg) scale(1.03);
      letter-spacing: 0.02em;
    }

    .name {
      font-family: Impact, "Arial Black", var(--font-sans);
      font-size: clamp(78px, 13vw, 188px);
      font-weight: 900;
      line-height: 0.74;
      color: #fff;
      letter-spacing: -0.03em;
      text-transform: uppercase;
      -webkit-text-stroke: clamp(1.5px, 0.22vw, 3px) #1e1e1e;
      text-shadow:
        5px 5px 0 rgba(255, 255, 255, 0.55),
        10px 10px 0 rgba(249, 22, 124, 0.08);
      transition: transform 0.28s ease, text-shadow 0.28s ease;
    }

    .hero-name-wrap:hover .name {
      transform: translateY(-5px);
      text-shadow:
        8px 8px 0 rgba(255, 255, 255, 0.65),
        14px 14px 0 rgba(249, 22, 124, 0.15);
    }

    .title {
      font-family: "Courier New", monospace;
      font-size: clamp(18px, 2.2vw, 32px);
      font-weight: 800;
      color: #1e1e1e;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin: 0;
      text-shadow: 1.5px 1.5px 0 rgba(255, 255, 255, 0.7);
    }

    .description {
      font-family: var(--font-sans);
      font-size: clamp(12px, 1.2vw, 15px);
      color: #1e1e1e;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.78;
      margin: 0 0 8px;
    }

    .divider {
      width: 110px;
      height: 2px;
      background: #1e1e1e;
      margin: 2px auto 0;
      box-shadow: 0 7px 0 rgba(255, 255, 255, 0.45);
    }

    .cv-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-width: 220px;
      padding: 15px 34px;
      background: #1e1e1e;
      border: 2px solid #1e1e1e;
      border-radius: 999px;
      color: #fff;
      font-family: "Courier New", monospace;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.28s ease, background 0.28s ease, color 0.28s ease, box-shadow 0.28s ease;
      box-shadow: 0 16px 0 rgba(30, 30, 30, 0.12);
    }

    .cv-button:hover {
      transform: translateY(-6px) rotate(-1deg);
      background: #fff;
      color: #1e1e1e;
      box-shadow: 8px 14px 0 rgba(30, 30, 30, 0.2);
    }

    .cv-button:active {
      transform: translateY(-1px) scale(0.98);
      box-shadow: 3px 6px 0 rgba(30, 30, 30, 0.18);
    }

    .cv-icon {
      font-size: 17px;
      line-height: 1;
    }

    .home-decoration {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .home-spark {
      position: absolute;
      width: 220px;
      height: 220px;
      opacity: 0.86;
    }

    .home-spark span {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 2px;
      height: 58px;
      background: #1e1e1e;
      transform-origin: 50% 100px;
    }

    .home-spark::before {
      content: '';
      position: absolute;
      left: 50%;
      top: 50%;
      width: 18px;
      height: 18px;
      border: 2px solid #1e1e1e;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 255, 255, 0.12);
    }

    .spark-left {
      left: 6%;
      top: 14%;
      transform: rotate(-16deg) scale(0.86);
    }

    .spark-right {
      right: 7%;
      bottom: 12%;
      transform: rotate(18deg) scale(1.05);
    }

    .home-orbit {
      position: absolute;
      border: 2px solid #1e1e1e;
      border-radius: 50%;
      opacity: 0.92;
    }

    .orbit-left {
      width: 42px;
      height: 42px;
      left: -18px;
      top: 26%;
    }

    .orbit-right {
      width: 150px;
      height: 150px;
      right: -42px;
      top: 54%;
      background: rgba(255, 255, 255, 0.12);
      border-color: transparent;
    }

    .home-cutline {
      position: absolute;
      width: 130px;
      height: 1.8px;
      background: #1e1e1e;
      opacity: 0.82;
      transform-origin: left center;
    }

    .cut-1 { left: 14%; top: 8%; transform: rotate(68deg); }
    .cut-2 { left: 18%; top: 16%; transform: rotate(24deg); width: 58px; }
    .cut-3 { right: 11%; top: 34%; transform: rotate(73deg); width: 84px; }
    .cut-4 { right: 19%; bottom: 20%; transform: rotate(29deg); width: 78px; }
    .cut-5 { left: 6%; bottom: 18%; transform: rotate(-24deg); width: 64px; }

    .home-floating-label {
      position: absolute;
      right: 8%;
      top: 16%;
      font-family: "Courier New", monospace;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.18em;
      color: #1e1e1e;
      border: 1.5px solid #1e1e1e;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.24);
      transform: rotate(7deg);
    }


    /* Home 清理版：去掉 Ellary 背后的 E 和参考图装饰图案 */
    #Home .home-script,
    #Home .home-decoration,
    #Home .home-spark,
    #Home .home-orbit,
    #Home .home-cutline,
    #Home .home-floating-label {
      display: none !important;
    }

    .about-me { min-height: 100vh; padding: 120px 0; position: relative; background: #ffffff; overflow: hidden; }
    .about-me::before { content: ''; position: absolute; inset: 0; background-image: url('https://raw.githubusercontent.com/ellaryzou/portfolio-ellary/main/about-bg.jpg'); background-repeat: no-repeat; background-position: center center; background-size: cover; z-index: 0; }
    .about-me-container { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 0 40px; }
    .about-content { position: relative; z-index: 1; }
    .dots-background, .bg-dot { display: none !important; }
    .section-header { text-align: center; margin-bottom: 60px; }
    .section-title { font-family: var(--font-serif); font-size: 36px; font-weight: 600; color: var(--dark-gray); margin-bottom: 20px; letter-spacing: 4px; }
    .section-divider { width: 80px; height: 3px; background: linear-gradient(90deg, var(--pink), var(--bright-pink)); margin: 0 auto; border-radius: 2px; }
    .paragraph { font-family: var(--font-sans); font-size: 16px; line-height: 1.8; color: var(--dark-gray); opacity: 0.9; margin-bottom: 24px; text-align: justify; text-indent: 2em; }
    .about-highlights { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 30px; margin-top: 60px; }
    .highlight-card { display: flex; align-items: center; gap: 20px; padding: 24px; background: var(--light-gray); border-radius: 16px; transition: all 0.3s ease; }
    .highlight-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(255,176,204,0.2); }
    .highlight-icon { font-size: 36px; }
    .highlight-title { font-family: var(--font-serif); font-size: 18px; font-weight: 600; color: var(--dark-gray); margin-bottom: 6px; }
    .highlight-desc { font-family: var(--font-sans); font-size: 13px; color: var(--dark-gray); opacity: 0.7; }


    /* ============ About 页面：点击展开式自我介绍 ============ */
    .about-intro {
      max-width: 860px;
      margin: 0 auto;
      line-height: 2;
      font-size: 16.5px;
      color: #363636;
      letter-spacing: 0.4px;
      font-family: var(--font-sans);
    }

    .about-intro p {
      margin-bottom: 14px;
      text-indent: 0;
    }

    .about-intro .indent-space {
      display: inline-block;
      width: 4em;
    }

    .about-intro .clear-text {
      color: #363636;
    }

    .about-intro .keyword {
      display: inline;
      padding: 2px 10px;
      margin: 0 3px;
      border: 1px solid #F9167C;
      border-radius: 8px;
      color: #F9167C;
      font-weight: 500;
      cursor: pointer;
      position: relative;
      background: rgba(255, 220, 225, 0.12);
      transition: background 0.25s, box-shadow 0.25s, transform 0.2s;
      user-select: none;
      white-space: nowrap;
    }

    .about-intro .keyword:hover {
      background: rgba(255, 200, 210, 0.35);
      box-shadow: 0 0 10px rgba(240, 160, 176, 0.3);
    }

    .about-intro .keyword:active {
      transform: scale(0.96);
    }

    .about-intro .keyword.revealed {
      background: rgba(240, 160, 176, 0.2);
      border-color: #F9167C;
    }

    .about-intro .keyword.mono {
      border-color: #F9167C;
      color: #F9167C;
      background: rgba(255, 220, 225, 0.12);
    }

    .about-intro .keyword.mono:hover {
      background: rgba(255, 200, 210, 0.35);
      box-shadow: 0 0 10px rgba(240, 160, 176, 0.3);
    }

    .about-intro .keyword.mono.revealed {
      background: rgba(240, 160, 176, 0.2);
      border-color: #F9167C;
    }

    .about-intro .blurred-content {
      color: rgba(54, 54, 54, 0.45);
      filter: blur(4px);
      transition: filter 0.5s ease, color 0.5s ease;
    }

    .about-intro .blurred-content.revealed {
      filter: blur(0);
      color: #363636;
    }

    .about-intro .blurred-content.revealed.hovered {
      color: #F9167C;
    }

    .about-intro .keyword.mono~.blurred-content.revealed.hovered {
      color: #363636;
    }

    .about-intro .greeting-en {
      font-family: var(--font-serif);
      font-size: 19px;
      color: #363636;
      letter-spacing: 1.2px;
      margin-bottom: 8px;
    }

    .about-intro .greeting-en .comma {
      color: #363636;
    }


    /* About 页面背景图与圆形清理 */
    #AboutMe .dots-background,
    #AboutMe .bg-dot {
      display: none !important;
    }

    .portfolio { padding: 120px 0; background: #ffffff !important; position: relative; }
    .portfolio::before { display: none !important; content: none !important; height: 0 !important; background: none !important; }
    .portfolio-container { max-width: 1200px; margin: 0 auto; padding: 0 40px; }
    .projects-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 30px; margin-bottom: 80px; }
    .project-card { background: var(--white); border-radius: 16px; overflow: hidden; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
    .project-card:hover { transform: translateY(-8px); box-shadow: 0 12px 40px rgba(255,176,204,0.2); }
    .project-color-bar { height: 6px; }
    .project-content { padding: 28px; }
    .project-category { font-family: var(--font-sans); font-size: 12px; font-weight: 600; color: var(--pink); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; display: block; }
    .project-title { font-family: var(--font-serif); font-size: 18px; font-weight: 600; color: var(--dark-gray); margin-bottom: 10px; line-height: 1.4; }
    .project-meta { font-family: var(--font-sans); font-size: 13px; color: var(--dark-gray); opacity: 0.7; margin-bottom: 8px; }
    .project-award { font-family: var(--font-sans); font-size: 12px; color: var(--bright-pink); font-weight: 600; margin-bottom: 12px; }
    .project-overview { font-family: var(--font-sans); font-size: 14px; color: var(--dark-gray); opacity: 0.8; line-height: 1.6; margin-bottom: 16px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .project-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag { font-family: var(--font-sans); font-size: 11px; padding: 4px 12px; background: var(--light-gray); color: var(--dark-gray); border-radius: 20px; opacity: 0.8; }
    .project-arrow { position: absolute; bottom: 28px; right: 28px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; color: var(--pink); transition: all 0.3s ease; }
    .project-card:hover .project-arrow { transform: translateX(5px); color: var(--bright-pink); }

    .games-section { margin-top: 80px; }
    .games-title { font-family: var(--font-serif); font-size: 24px; font-weight: 600; color: var(--dark-gray); margin-bottom: 40px; text-align: center; }
    .games-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
    .game-card {
      position: relative;
      background: var(--white);
      border-radius: 16px;
      padding: 30px;
      text-align: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      overflow: hidden;
    }
    .game-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(255,176,204,0.15);
    }
    .game-icon { width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; border: 2px solid; }
    .icon-text { font-size: 36px; }
    .game-title { font-family: var(--font-serif); font-size: 20px; font-weight: 600; color: var(--dark-gray); margin-bottom: 12px; }
    .game-description { font-family: var(--font-sans); font-size: 14px; color: var(--dark-gray); opacity: 0.8; line-height: 1.6; margin-bottom: 20px; }
    .game-features { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
    .feature-tag { font-family: var(--font-sans); font-size: 11px; padding: 4px 12px; background: var(--pink); color: var(--white); border-radius: 20px; font-weight: 500; }

    .clickable-game-card {
      cursor: pointer;
    }

    .hover-reveal-game-card {
      padding: 0;
      min-height: 430px;
      background: #f4f0ec;
      border: 1px solid rgba(255, 176, 204, 0.45);
    }

    .hover-reveal-media {
      position: relative;
      width: 100%;
      min-height: 430px;
      height: 100%;
      overflow: hidden;
      border-radius: 16px;
      isolation: isolate;
    }

    .hover-reveal-image {
      position: absolute;
      inset: 0;
      background-image: var(--game-cover-image);
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      transition: transform 0.55s ease, filter 0.35s ease;
    }

    .hover-reveal-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 30px 28px 30px;
      background:
        linear-gradient(180deg, rgba(20, 20, 20, 0.05) 0%, rgba(20, 20, 20, 0.12) 34%, rgba(20, 20, 20, 0.76) 100%);
      opacity: 0;
      transition: opacity 0.35s ease, backdrop-filter 0.35s ease;
      backdrop-filter: blur(0px);
      -webkit-backdrop-filter: blur(0px);
    }

    .hover-reveal-content {
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      transform: translateY(26px);
      opacity: 0;
      transition: transform 0.38s ease, opacity 0.32s ease;
      text-align: center;
    }

    .hover-reveal-content .game-title {
      font-size: 38px;
      line-height: 1.24;
      color: rgba(255,255,255,0.96);
      margin-bottom: 0;
      text-shadow: 0 3px 18px rgba(0,0,0,0.25);
    }

    .hover-reveal-content .game-description {
      margin-bottom: 0;
      font-size: 18px;
      line-height: 1.8;
      color: rgba(255,255,255,0.9);
      text-shadow: 0 2px 10px rgba(0,0,0,0.22);
      max-width: 820px;
    }

    .hover-reveal-content .game-features {
      gap: 10px;
      margin-top: 4px;
    }

    .hover-reveal-content .feature-tag {
      background: rgba(255, 176, 204, 0.86);
      color: #ffffff;
      padding: 7px 16px;
      font-size: 12px;
      letter-spacing: 0.02em;
      box-shadow: 0 8px 20px rgba(255, 176, 204, 0.22);
    }

    .hover-reveal-cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      border-radius: 999px;
      background: rgba(255,255,255,0.92);
      color: var(--dark-gray);
      font-family: var(--font-sans);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;

    /* ============ Contact：深灰底 + 淡粉 3D Connect 按钮 ============ */
    .contact {
      --contact-pink: #FFD4E6;
      --contact-hot-pink: #F9167C;
      --contact-dark: #2B2B2B;
      --contact-button-dark: #222222;
      min-height: 72vh;
      padding: 80px 0 44px;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 52%, rgba(255, 212, 230, 0.13) 0%, rgba(255, 212, 230, 0.06) 32%, transparent 62%),
        radial-gradient(circle at 14% 27%, rgba(255, 212, 230, 0.10) 0%, transparent 28%),
        radial-gradient(circle at 87% 76%, rgba(249, 22, 124, 0.10) 0%, transparent 32%),
        linear-gradient(180deg, #333333 0%, #262626 100%);
      color: #ffffff;
    }

    .contact::before {
      content: '';
      position: absolute;
      inset: -20%;
      pointer-events: none;
      background-image:
        radial-gradient(rgba(255, 255, 255, 0.16) 0.7px, transparent 0.95px),
        radial-gradient(rgba(255, 212, 230, 0.18) 0.75px, transparent 1px);
      background-size: 4px 4px, 8px 8px;
      background-position: 0 0, 3px 4px;
      opacity: 0.12;
      mix-blend-mode: screen;
      transform: rotate(-1deg);
    }

    .contact::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 56%;
      width: min(980px, 88vw);
      height: min(520px, 56vw);
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 212, 230, 0.22) 0%, rgba(255, 212, 230, 0.10) 34%, transparent 70%);
      filter: blur(28px);
      opacity: 0.8;
      pointer-events: none;
      transition: opacity 0.35s ease, background 0.35s ease;
    }

    .contact:has(.connect-button:hover)::after {
      opacity: 1;
      background: radial-gradient(circle, rgba(255, 212, 230, 0.42) 0%, rgba(249, 22, 124, 0.24) 36%, transparent 72%);
    }

    .contact-container {
      position: relative;
      z-index: 2;
      max-width: 1180px;
      min-height: auto;
      margin: 0 auto;
      padding: 0 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    }

    .contact-title-wrap {

      align-items: center;

    }

    .contact-script {

    .contact-title {

      letter-spacing: -0.04em;

        5px 5px 0 rgba(255, 212, 230, 0.72),

    }

    .contact-note {

      transform: rotate(-4deg);

      text-shadow: 0 0 18px rgba(255, 212, 230, 0.18);
    }

    .connect-stage {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: min(780px, 92vw);
      min-height: 160px;
    }

    .connect-button {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: min(620px, 82vw);
      min-height: clamp(92px, 10vw, 146px);
      padding: 22px 64px;
      border-radius: 999px;
      text-decoration: none;
      font-family: Inter, Arial, sans-serif;
      font-size: clamp(56px, 7vw, 108px);
      font-weight: 600;
      line-height: 1;
      letter-spacing: -0.04em;
      color: #2E2E2E;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.58), rgba(255, 255, 255, 0.12) 38%, rgba(0, 0, 0, 0.04) 100%),
        var(--contact-pink);
      border: 3px solid rgba(255, 255, 255, 0.8);
      box-shadow:
        0 14px 0 rgba(126, 78, 98, 0.72),
        0 23px 0 rgba(255, 255, 255, 0.14),
        0 34px 54px rgba(0, 0, 0, 0.34),
        0 0 0 14px rgba(255, 212, 230, 0.13);
      transform: rotate(2deg);
      overflow: visible;
      transition:
        transform 0.26s ease,
        box-shadow 0.26s ease,
        color 0.26s ease,
        background 0.26s ease,
        filter 0.26s ease;
    }

    .connect-button::before {
      content: '';
      position: absolute;
      inset: 10px 14px auto 14px;
      height: 38%;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.46), rgba(255, 255, 255, 0));
      pointer-events: none;
    }

    .connect-button::after {
      content: '';
      position: absolute;
      inset: -15px;
      border-radius: 999px;
      border: 2px solid rgba(255, 212, 230, 0.34);
      filter: blur(1px);
      pointer-events: none;
      transition: border-color 0.26s ease, box-shadow 0.26s ease;
    }

    .connect-button:hover {
      transform: translateY(-10px) rotate(-1deg) scale(1.02);
      color: #F9167C;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0.18) 38%, rgba(249, 22, 124, 0.04) 100%),
        #FFE1ED;
      filter: saturate(1.08);
      box-shadow:
        0 18px 0 rgba(126, 78, 98, 0.78),
        0 30px 0 rgba(255, 255, 255, 0.18),
        0 0 54px rgba(255, 212, 230, 0.78),
        0 0 138px rgba(249, 22, 124, 0.34),
        0 0 0 20px rgba(255, 212, 230, 0.20);
    }

    .connect-button:hover::after {
      border-color: rgba(255, 212, 230, 0.8);
      box-shadow: 0 0 48px rgba(249, 22, 124, 0.35);
    }

    .connect-button:active {
      transform: translateY(2px) rotate(0deg) scale(0.985);
      box-shadow:
        0 8px 0 rgba(126, 78, 98, 0.78),
        0 14px 0 rgba(255, 255, 255, 0.12),
        0 0 50px rgba(255, 212, 230, 0.55);
    }

    .connect-word {
      position: relative;
      z-index: 1;
    }

    .connect-doodle {
      position: absolute;
      z-index: 1;
      width: 150px;
      height: 118px;
      opacity: 0;
      transform: scale(0.82);
      transition: opacity 0.28s ease, transform 0.28s ease;
      pointer-events: none;
      filter: drop-shadow(0 0 8px rgba(255, 212, 230, 0.18));
    }

    .connect-doodle::before,
    .connect-doodle::after {
      content: '';
      position: absolute;
      border: solid rgba(255, 212, 230, 0.9);
      border-width: 0 0 6px 6px;
      border-radius: 0 0 0 100%;
    }

    .connect-doodle::before {
      width: 112px;
      height: 86px;
      left: 14px;
      top: 12px;
      transform: rotate(-18deg);
    }

    .connect-doodle::after {
      width: 52px;
      height: 42px;
      left: 4px;
      top: 2px;
      transform: rotate(36deg);
    }

    .doodle-left {
      left: -30px;
      top: 0;
      transform: rotate(-18deg) scale(0.82);
    }

    .doodle-right {
      right: -32px;
      bottom: -4px;
      transform: rotate(156deg) scale(0.82);
    }

    .connect-stage:hover .connect-doodle {
      opacity: 1;
    }

    .connect-stage:hover .doodle-left {
      transform: rotate(-18deg) scale(1);
    }

    .connect-stage:hover .doodle-right {
      transform: rotate(156deg) scale(1);
    }

      z-index: 4;
    }

    #Home .home-star {
      display: flex !important;
      animation: homeStarDrift 5.8s ease-in-out infinite alternate;
      will-change: transform, opacity, filter;
    }

    #Home .home-star svg {
      transform-origin: 50% 50%;
      animation: homeStarSpin 9s linear infinite;
      will-change: transform;
    }

    #Home .home-star:nth-child(2) svg { animation-duration: 7.5s; animation-direction: reverse; }
    #Home .home-star:nth-child(3) svg { animation-duration: 10.5s; }
    #Home .home-star:nth-child(4) svg { animation-duration: 8.2s; animation-direction: reverse; }

    #Home .home-star:nth-child(3) { animation-delay: -2.1s; }
    #Home .home-star:nth-child(4) { animation-delay: -0.8s; }
    #Home .home-star:nth-child(5) { animation-delay: -2.8s; }
    #Home .home-star:nth-child(6) { animation-delay: -1.7s; }
    #Home .home-star:nth-child(7) { animation-delay: -3.3s; }

    @keyframes homeStarSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes homeStarDrift {
      from {
        opacity: 0.72;
        filter: drop-shadow(0 0 4px rgba(255, 255, 255, 0.38));

      to {
        opacity: 1;
        filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.66));

    .section-ripple-transition {

      inset: 0;
      z-index: 9998;
      pointer-events: none;
      opacity: 0;
      transform: scale(0.72);
      background:
        radial-gradient(circle at var(--ripple-x, 50%) var(--ripple-y, 50%),
          rgba(255, 255, 255, 0.88) 0%,
          rgba(255, 212, 230, 0.68) 16%,
          rgba(249, 22, 124, 0.22) 34%,
          rgba(255, 176, 204, 0.12) 50%,
          transparent 72%);
      filter: blur(18px) saturate(1.12);
      mix-blend-mode: screen;
    }

    .section-ripple-transition.active {
      animation: sectionRippleBloom 0.9s cubic-bezier(0.18, 0.72, 0.2, 1) both;
    }

    @keyframes sectionRippleBloom {
      0% {
        opacity: 0;

      38% {
        opacity: 0.92;

    function App() {
      const [activeSection, setActiveSection] = useState('Home');
      const transitionLockRef = React.useRef(false);

      const goToSection = (sectionId) => {
        const element = document.getElementById(sectionId);
        if (!element || transitionLockRef.current) return;
        transitionLockRef.current = true;
        element.scrollIntoView({ behavior: 'smooth', block: 'start' });
        setActiveSection(sectionId);
        window.setTimeout(() => {
          transitionLockRef.current = false;
        }, 720);
      };

      useEffect(() => {
        const sections = ['Home', 'AboutMe', 'Portfolio', 'Contact'];
        const handleScroll = () => {
          for (const section of sections) {
            const element = document.getElementById(section);
            if (element) {
              const rect = element.getBoundingClientRect();
              if (rect.top <= window.innerHeight * 0.36 && rect.bottom >= window.innerHeight * 0.36) {
                setActiveSection(section);
                break;
              }
            }
          }
        };

        window.addEventListener('scroll', handleScroll, { passive: true });
        handleScroll();

        return () => {
          window.removeEventListener('scroll', handleScroll);
        };
      }, []);

      const scrollToSection = (sectionId) => {
        const element = document.getElementById(sectionId);
        if (element) {
          element.scrollIntoView({ behavior: 'auto', block: 'start' });
        }
      };

      return (
        <div className="app">
          <Navbar activeSection={activeSection} onNavClick={scrollToSection} />
          <Home />
          <AboutMe />
          <Portfolio />
          <Contact />
        </div>
      );
    }
